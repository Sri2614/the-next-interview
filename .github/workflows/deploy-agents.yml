name: Deploy Agents

on:
  push:
    branches: [main]
    paths:
      - 'agents/**'
      - '.github/workflows/deploy-agents.yml'

permissions:
  contents: read
  id-token: write   # required for Workload Identity Federation

jobs:
  deploy:
    name: Build & Deploy to Cloud Run
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (Workload Identity)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/379802788252/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deployer@thesimplifiedtech.iam.gserviceaccount.com

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: thesimplifiedtech

      - name: Submit Cloud Build
        run: |
          gcloud builds submit \
            --config agents/cloudbuild.yaml \
            --project thesimplifiedtech
