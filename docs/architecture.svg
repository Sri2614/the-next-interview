<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect width="1200" height="600" fill="white"/>

  <defs>
    <marker id="arr-blue" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#4a9eed"/>
    </marker>
    <marker id="arr-purple" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#8b5cf6"/>
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#22c55e"/>
    </marker>
    <marker id="arr-amber" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="600" y="30" text-anchor="middle" font-size="24" font-weight="700" fill="#1e1e1e">The Next Interview — Architecture</text>

  <!-- ═══ Browser Zone ═══ -->
  <rect x="30" y="46" width="1140" height="148" rx="12" fill="#dbe4ff" fill-opacity="0.6" stroke="#4a9eed" stroke-width="1.5"/>
  <text x="48" y="67" font-size="15" font-weight="700" fill="#1d4ed8">Browser  (Next.js 14  ·  Cloud Run)</text>

  <rect x="72"  y="76" width="178" height="86" rx="9" fill="#a5d8ff" stroke="#4a9eed" stroke-width="2"/>
  <text x="161" y="114" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a5f">1. Resume</text>
  <text x="161" y="134" text-anchor="middle" font-size="13" fill="#1d4ed8">/resume</text>

  <rect x="278" y="76" width="178" height="86" rx="9" fill="#a5d8ff" stroke="#4a9eed" stroke-width="2"/>
  <text x="367" y="114" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a5f">2. Match</text>
  <text x="367" y="134" text-anchor="middle" font-size="13" fill="#1d4ed8">/match</text>

  <rect x="484" y="76" width="178" height="86" rx="9" fill="#a5d8ff" stroke="#4a9eed" stroke-width="2"/>
  <text x="573" y="114" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a5f">3. Prep</text>
  <text x="573" y="134" text-anchor="middle" font-size="13" fill="#1d4ed8">/prep</text>

  <rect x="690" y="76" width="178" height="86" rx="9" fill="#a5d8ff" stroke="#4a9eed" stroke-width="2"/>
  <text x="779" y="114" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a5f">4. Assess</text>
  <text x="779" y="134" text-anchor="middle" font-size="13" fill="#1d4ed8">/assessment</text>

  <rect x="896" y="76" width="178" height="86" rx="9" fill="#a5d8ff" stroke="#4a9eed" stroke-width="2"/>
  <text x="985" y="114" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a5f">5. Report</text>
  <text x="985" y="134" text-anchor="middle" font-size="13" fill="#1d4ed8">/report</text>

  <!-- Step → Step arrows -->
  <line x1="251" y1="119" x2="276" y2="119" stroke="#4a9eed" stroke-width="2.5" marker-end="url(#arr-blue)"/>
  <line x1="457" y1="119" x2="482" y2="119" stroke="#4a9eed" stroke-width="2.5" marker-end="url(#arr-blue)"/>
  <line x1="663" y1="119" x2="688" y2="119" stroke="#4a9eed" stroke-width="2.5" marker-end="url(#arr-blue)"/>
  <line x1="869" y1="119" x2="894" y2="119" stroke="#4a9eed" stroke-width="2.5" marker-end="url(#arr-blue)"/>

  <!-- POST /run_sse label -->
  <text x="600" y="218" text-anchor="middle" font-size="13" fill="#9ca3af" font-style="italic">POST /run_sse</text>

  <!-- Step → Agent dashed arrows -->
  <line x1="161" y1="164" x2="161" y2="253" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arr-purple)"/>
  <line x1="367" y1="164" x2="367" y2="253" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arr-purple)"/>
  <line x1="573" y1="164" x2="573" y2="253" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arr-purple)"/>
  <line x1="779" y1="164" x2="779" y2="253" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arr-purple)"/>
  <line x1="985" y1="164" x2="985" y2="253" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arr-purple)"/>

  <!-- ═══ ADK Agents Zone ═══ -->
  <rect x="30" y="240" width="1140" height="148" rx="12" fill="#e5dbff" fill-opacity="0.6" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="48" y="261" font-size="15" font-weight="700" fill="#7c3aed">ADK Agents  (Python  ·  Cloud Run)</text>

  <rect x="72"  y="268" width="178" height="84" rx="9" fill="#d0bfff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="161" y="304" text-anchor="middle" font-size="15" font-weight="700" fill="#3b0764">resume_parser</text>
  <text x="161" y="323" text-anchor="middle" font-size="13" fill="#7c3aed">LlmAgent</text>

  <rect x="278" y="268" width="178" height="84" rx="9" fill="#d0bfff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="367" y="304" text-anchor="middle" font-size="15" font-weight="700" fill="#3b0764">vacancy_matcher</text>
  <text x="367" y="323" text-anchor="middle" font-size="13" fill="#7c3aed">LlmAgent</text>

  <!-- Parallel group -->
  <rect x="474" y="260" width="198" height="92" rx="9" fill="#d0bfff" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="573" y="279" text-anchor="middle" font-size="13" fill="#7c3aed" font-style="italic">ParallelAgent</text>
  <text x="573" y="300" text-anchor="middle" font-size="15" font-weight="700" fill="#3b0764">question_gen</text>
  <text x="573" y="320" text-anchor="middle" font-size="15" font-weight="700" fill="#3b0764">code_challenge</text>

  <rect x="690" y="268" width="178" height="84" rx="9" fill="#d0bfff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="779" y="304" text-anchor="middle" font-size="15" font-weight="700" fill="#3b0764">answer_evaluator</text>
  <text x="779" y="323" text-anchor="middle" font-size="13" fill="#7c3aed">LlmAgent</text>

  <!-- Sequential group -->
  <rect x="880" y="260" width="202" height="92" rx="9" fill="#d0bfff" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="981" y="279" text-anchor="middle" font-size="13" fill="#7c3aed" font-style="italic">SequentialAgent</text>
  <text x="981" y="300" text-anchor="middle" font-size="14" font-weight="700" fill="#3b0764">readiness_assessor</text>
  <text x="981" y="320" text-anchor="middle" font-size="14" font-weight="700" fill="#3b0764">recommend_agent</text>

  <!-- Agent → External arrows -->
  <line x1="161" y1="354" x2="161" y2="436" stroke="#22c55e" stroke-width="2" marker-end="url(#arr-green)"/>
  <line x1="367" y1="354" x2="405" y2="436" stroke="#22c55e" stroke-width="2" marker-end="url(#arr-green)"/>
  <line x1="573" y1="354" x2="826" y2="436" stroke="#f59e0b" stroke-width="2" marker-end="url(#arr-amber)"/>
  <line x1="779" y1="354" x2="840" y2="436" stroke="#f59e0b" stroke-width="2" marker-end="url(#arr-amber)"/>
  <line x1="981" y1="354" x2="860" y2="436" stroke="#f59e0b" stroke-width="2" marker-end="url(#arr-amber)"/>

  <!-- ═══ External Services Zone ═══ -->
  <rect x="30" y="428" width="1140" height="148" rx="12" fill="#d3f9d8" fill-opacity="0.6" stroke="#22c55e" stroke-width="1.5"/>
  <text x="48" y="449" font-size="15" font-weight="700" fill="#15803d">External Services  (Google Cloud  ·  RapidAPI)</text>

  <rect x="52"  y="458" width="220" height="84" rx="9" fill="#b2f2bb" stroke="#22c55e" stroke-width="2"/>
  <text x="162" y="496" text-anchor="middle" font-size="17" font-weight="700" fill="#14532d">Document AI</text>
  <text x="162" y="516" text-anchor="middle" font-size="13" fill="#15803d">PDF OCR  ·  us-central1</text>

  <rect x="304" y="458" width="220" height="84" rx="9" fill="#ffd8a8" stroke="#f59e0b" stroke-width="2"/>
  <text x="414" y="496" text-anchor="middle" font-size="17" font-weight="700" fill="#7c2d12">RapidAPI JSearch</text>
  <text x="414" y="516" text-anchor="middle" font-size="13" fill="#92400e">Live jobs  (fallback: mock)</text>

  <rect x="556" y="458" width="568" height="84" rx="9" fill="#fff3bf" stroke="#f59e0b" stroke-width="2"/>
  <text x="840" y="496" text-anchor="middle" font-size="17" font-weight="700" fill="#78350f">Gemini 2.5 Flash  (Vertex AI)</text>
  <text x="840" y="516" text-anchor="middle" font-size="13" fill="#92400e">All 5 agents  ·  thinking_budget=0</text>
</svg>
