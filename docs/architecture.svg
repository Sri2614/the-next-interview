<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 580" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect width="1200" height="580" fill="white"/>

  <defs>
    <marker id="arr-blue" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#4a9eed"/>
    </marker>
    <marker id="arr-purple" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#8b5cf6"/>
    </marker>
    <marker id="arr-green" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="arr-amber" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="600" y="28" text-anchor="middle" font-size="20" font-weight="700" fill="#1e1e1e">The Next Interview — Architecture</text>

  <!-- ═══ Browser Zone ═══ -->
  <rect x="40" y="44" width="1120" height="134" rx="12" fill="#dbe4ff" fill-opacity="0.55" stroke="#4a9eed" stroke-width="1.5"/>
  <text x="56" y="62" font-size="12" font-weight="600" fill="#2563eb">Browser  (Next.js 14  ·  Cloud Run)</text>

  <rect x="80"  y="68" width="170" height="80" rx="8" fill="#a5d8ff" stroke="#4a9eed" stroke-width="2"/>
  <text x="165" y="103" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a5f">1. Resume</text>
  <text x="165" y="121" text-anchor="middle" font-size="11" fill="#1d4ed8">/resume</text>

  <rect x="283" y="68" width="170" height="80" rx="8" fill="#a5d8ff" stroke="#4a9eed" stroke-width="2"/>
  <text x="368" y="103" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a5f">2. Match</text>
  <text x="368" y="121" text-anchor="middle" font-size="11" fill="#1d4ed8">/match</text>

  <rect x="486" y="68" width="170" height="80" rx="8" fill="#a5d8ff" stroke="#4a9eed" stroke-width="2"/>
  <text x="571" y="103" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a5f">3. Prep</text>
  <text x="571" y="121" text-anchor="middle" font-size="11" fill="#1d4ed8">/prep</text>

  <rect x="689" y="68" width="170" height="80" rx="8" fill="#a5d8ff" stroke="#4a9eed" stroke-width="2"/>
  <text x="774" y="103" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a5f">4. Assess</text>
  <text x="774" y="121" text-anchor="middle" font-size="11" fill="#1d4ed8">/assessment</text>

  <rect x="892" y="68" width="170" height="80" rx="8" fill="#a5d8ff" stroke="#4a9eed" stroke-width="2"/>
  <text x="977" y="103" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a5f">5. Report</text>
  <text x="977" y="121" text-anchor="middle" font-size="11" fill="#1d4ed8">/report</text>

  <!-- Step → Step arrows -->
  <line x1="252" y1="108" x2="281" y2="108" stroke="#4a9eed" stroke-width="2" marker-end="url(#arr-blue)"/>
  <line x1="455" y1="108" x2="484" y2="108" stroke="#4a9eed" stroke-width="2" marker-end="url(#arr-blue)"/>
  <line x1="658" y1="108" x2="687" y2="108" stroke="#4a9eed" stroke-width="2" marker-end="url(#arr-blue)"/>
  <line x1="861" y1="108" x2="890" y2="108" stroke="#4a9eed" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- POST /run_sse label -->
  <text x="600" y="205" text-anchor="middle" font-size="11" fill="#9ca3af" font-style="italic">POST /run_sse</text>

  <!-- Step → Agent dashed arrows -->
  <line x1="165" y1="150" x2="165" y2="243" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arr-purple)"/>
  <line x1="368" y1="150" x2="368" y2="243" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arr-purple)"/>
  <line x1="571" y1="150" x2="571" y2="243" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arr-purple)"/>
  <line x1="774" y1="150" x2="774" y2="243" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arr-purple)"/>
  <line x1="977" y1="150" x2="977" y2="243" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arr-purple)"/>

  <!-- ═══ ADK Agents Zone ═══ -->
  <rect x="40" y="228" width="1120" height="138" rx="12" fill="#e5dbff" fill-opacity="0.55" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="56" y="246" font-size="12" font-weight="600" fill="#7c3aed">ADK Agents  (Python  ·  Cloud Run)</text>

  <rect x="80"  y="252" width="170" height="76" rx="8" fill="#d0bfff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="165" y="285" text-anchor="middle" font-size="13" font-weight="700" fill="#3b0764">resume_parser</text>
  <text x="165" y="303" text-anchor="middle" font-size="11" fill="#7c3aed">LlmAgent</text>

  <rect x="283" y="252" width="170" height="76" rx="8" fill="#d0bfff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="368" y="285" text-anchor="middle" font-size="13" font-weight="700" fill="#3b0764">vacancy_matcher</text>
  <text x="368" y="303" text-anchor="middle" font-size="11" fill="#7c3aed">LlmAgent</text>

  <!-- Parallel group -->
  <rect x="476" y="246" width="190" height="86" rx="8" fill="#d0bfff" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="571" y="263" text-anchor="middle" font-size="10" fill="#7c3aed" font-style="italic">ParallelAgent</text>
  <text x="571" y="282" text-anchor="middle" font-size="13" font-weight="700" fill="#3b0764">question_gen</text>
  <text x="571" y="300" text-anchor="middle" font-size="13" font-weight="700" fill="#3b0764">code_challenge</text>

  <rect x="689" y="252" width="170" height="76" rx="8" fill="#d0bfff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="774" y="285" text-anchor="middle" font-size="13" font-weight="700" fill="#3b0764">answer_evaluator</text>
  <text x="774" y="303" text-anchor="middle" font-size="11" fill="#7c3aed">LlmAgent</text>

  <!-- Sequential group -->
  <rect x="882" y="246" width="190" height="86" rx="8" fill="#d0bfff" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="977" y="263" text-anchor="middle" font-size="10" fill="#7c3aed" font-style="italic">SequentialAgent</text>
  <text x="977" y="282" text-anchor="middle" font-size="12" font-weight="700" fill="#3b0764">readiness_assessor</text>
  <text x="977" y="300" text-anchor="middle" font-size="12" font-weight="700" fill="#3b0764">recommend_agent</text>

  <!-- Agent → External arrows -->
  <line x1="165" y1="330" x2="165" y2="422" stroke="#22c55e" stroke-width="2" marker-end="url(#arr-green)"/>
  <line x1="368" y1="330" x2="403" y2="422" stroke="#22c55e" stroke-width="2" marker-end="url(#arr-green)"/>
  <line x1="571" y1="334" x2="818" y2="422" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr-amber)"/>
  <line x1="774" y1="330" x2="833" y2="422" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr-amber)"/>
  <line x1="977" y1="334" x2="852" y2="422" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr-amber)"/>

  <!-- ═══ External Services Zone ═══ -->
  <rect x="40" y="416" width="1120" height="140" rx="12" fill="#d3f9d8" fill-opacity="0.55" stroke="#22c55e" stroke-width="1.5"/>
  <text x="56" y="434" font-size="12" font-weight="600" fill="#15803d">External Services  (Google Cloud  ·  RapidAPI)</text>

  <rect x="60"  y="442" width="210" height="78" rx="8" fill="#b2f2bb" stroke="#22c55e" stroke-width="2"/>
  <text x="165" y="477" text-anchor="middle" font-size="14" font-weight="700" fill="#14532d">Document AI</text>
  <text x="165" y="496" text-anchor="middle" font-size="11" fill="#15803d">PDF OCR  ·  us-central1</text>

  <rect x="308" y="442" width="215" height="78" rx="8" fill="#ffd8a8" stroke="#f59e0b" stroke-width="2"/>
  <text x="415" y="477" text-anchor="middle" font-size="14" font-weight="700" fill="#7c2d12">RapidAPI JSearch</text>
  <text x="415" y="496" text-anchor="middle" font-size="11" fill="#92400e">Live job listings  (fallback: mock)</text>

  <rect x="560" y="442" width="555" height="78" rx="8" fill="#fff3bf" stroke="#f59e0b" stroke-width="2"/>
  <text x="837" y="477" text-anchor="middle" font-size="14" font-weight="700" fill="#78350f">Gemini 2.5 Flash  (Vertex AI)</text>
  <text x="837" y="496" text-anchor="middle" font-size="11" fill="#92400e">All 5 agents  ·  thinking_budget=0</text>
</svg>
