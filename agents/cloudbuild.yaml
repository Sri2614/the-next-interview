steps:
  # Build the agents image — context is the repo root so ../data is accessible
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -f
      - agents/Dockerfile
      - -t
      - us-central1-docker.pkg.dev/thesimplifiedtech/the-next-interview/agents:latest
      - .

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - us-central1-docker.pkg.dev/thesimplifiedtech/the-next-interview/agents:latest

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - the-next-interview-agents
      - --image=us-central1-docker.pkg.dev/thesimplifiedtech/the-next-interview/agents:latest
      - --region=us-central1
      - --project=thesimplifiedtech
      - --platform=managed
      - --allow-unauthenticated
      - --min-instances=1
      - --timeout=300
      - --set-env-vars=GOOGLE_GENAI_USE_VERTEXAI=TRUE,GOOGLE_CLOUD_PROJECT=thesimplifiedtech,GOOGLE_CLOUD_LOCATION=us-central1,RAPIDAPI_KEY=2fcaab5e6bmsh3423a5d38499328p1a493ejsn2cc5e114d92d

images:
  - us-central1-docker.pkg.dev/thesimplifiedtech/the-next-interview/agents:latest
