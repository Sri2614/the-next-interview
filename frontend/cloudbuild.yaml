steps:
  # Step 1: Dynamically fetch the agents Cloud Run URL — no hardcoding needed
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-c'
      - |
        AGENTS_URL=$(gcloud run services describe the-next-interview-agents \
          --region us-central1 \
          --format='value(status.url)')
        echo "Agents URL: $$AGENTS_URL"
        echo "$$AGENTS_URL" > /workspace/agents_url.txt

  # Step 2: Build the Next.js image — NEXT_PUBLIC_ADK_URL baked in at build time
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: bash
    args:
      - '-c'
      - |
        AGENTS_URL=$(cat /workspace/agents_url.txt)
        docker build \
          -f Dockerfile \
          --build-arg NEXT_PUBLIC_ADK_URL=$$AGENTS_URL \
          --build-arg NEXT_PUBLIC_FIREBASE_API_KEY=AIzaSyDquXr5dtFWieAa0Z0e2Z8G7gffvm4C-Lk \
          --build-arg NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=thesimplifiedtech-f2dee.firebaseapp.com \
          --build-arg NEXT_PUBLIC_FIREBASE_PROJECT_ID=thesimplifiedtech-f2dee \
          --build-arg NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=thesimplifiedtech-f2dee.firebasestorage.app \
          --build-arg NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=37128181376 \
          --build-arg NEXT_PUBLIC_FIREBASE_APP_ID=1:37128181376:web:9f8d25a02d9dcf5ea43865 \
          -t us-central1-docker.pkg.dev/thesimplifiedtech/the-next-interview/frontend:latest \
          .

  # Step 3: Push the image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - us-central1-docker.pkg.dev/thesimplifiedtech/the-next-interview/frontend:latest

  # Step 4: Deploy the new image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-c'
      - |
        gcloud run deploy the-next-interview-frontend \
          --image us-central1-docker.pkg.dev/thesimplifiedtech/the-next-interview/frontend:latest \
          --region us-central1 \
          --project thesimplifiedtech \
          --allow-unauthenticated \
          --set-env-vars RAPIDAPI_KEY=2fcaab5e6bmsh3423a5d38499328p1a493ejsn2cc5e114d92d

images:
  - us-central1-docker.pkg.dev/thesimplifiedtech/the-next-interview/frontend:latest
